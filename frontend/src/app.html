<!doctype html>
<html lang="en" data-theme="cerberus">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<body>
		<script>
			try {
				const s = JSON.parse(localStorage.getItem('app-state') || '{}');
				if (s.darkMode) document.documentElement.classList.add('dark');
				if (s.spoilerMode) document.documentElement.classList.add('spoiler');
			} catch {}
		</script>
		<div id="app" class="">%sveltekit.body%</div>
	</body>
</html>
